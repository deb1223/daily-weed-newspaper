<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Daily Weed Newspaper — Page 2: The Sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Space+Mono:wght@400;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="page2.css" />
<style>
  /* Canvas chrome — newsprint backdrop + grain overlay */
  html, body {
    margin: 0;
    background: #e8e2d0;
    font-family: "Source Serif 4", Georgia, serif;
  }
  body::after {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none; z-index: 9999;
    opacity: 0.22;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
    mix-blend-mode: multiply;
  }

  /* Annotation card — palette proposal */
  .palette {
    width: 600px;
    background: #f4f0e4;
    color: #1a1008;
    font-family: "Source Serif 4", Georgia, serif;
    padding: 24px 26px 26px;
    border-top: 3px solid #1a1008;
    border-bottom: 3px solid #1a1008;
  }
  .palette h3 {
    font-family: "Playfair Display", serif;
    font-weight: 900; font-style: italic;
    font-size: 26px; letter-spacing: -0.01em;
    margin: 0 0 4px;
  }
  .palette .sub {
    font-family: "Space Mono", monospace;
    font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase; color: #6b5e45;
    margin-bottom: 14px;
    border-bottom: 1px solid #1a1008;
    padding-bottom: 8px;
  }
  .palette p {
    font-size: 13.5px; line-height: 1.55;
    margin: 8px 0 14px;
    color: #1a1008;
    text-wrap: pretty;
  }
  .palette p em { color: #6b5e45; font-style: italic; }
  .swatches { display: grid; grid-template-columns: 1fr; gap: 0; border-top: 1px solid #1a1008; }
  .swatch-row {
    display: grid;
    grid-template-columns: 36px 110px 1fr 90px;
    gap: 12px; align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid #f0e9d9;
    font-family: "Space Mono", monospace;
    font-size: 10px; letter-spacing: 0.06em;
  }
  .swatch-chip { width: 36px; height: 22px; border: 1px solid #1a1008; }
  .swatch-cat {
    font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: #1a1008;
  }
  .swatch-var { color: #6b5e45; font-size: 10px; }
  .swatch-hex {
    text-align: right; font-weight: 700;
    color: #1a1008; letter-spacing: 0.06em;
  }
  .palette .footnote {
    margin-top: 14px;
    font-style: italic;
    font-size: 11.5px;
    color: #6b5e45;
    border-top: 1px solid #f0e9d9;
    padding-top: 10px;
  }

  /* Section-spec annotation */
  .annot {
    width: 480px;
    background: #f4f0e4;
    color: #1a1008;
    font-family: "Source Serif 4", Georgia, serif;
    padding: 24px 26px;
    border: 3px double #1a1008;
  }
  .annot h3 {
    font-family: "Playfair Display", serif;
    font-weight: 900; font-style: italic;
    font-size: 22px; margin: 0 0 4px;
  }
  .annot .kicker-tag {
    font-family: "Space Mono", monospace;
    font-size: 9.5px; letter-spacing: 0.22em;
    text-transform: uppercase; color: #6b5e45;
    margin-bottom: 12px; display: block;
    border-bottom: 1px solid #1a1008; padding-bottom: 6px;
  }
  .annot ul { padding: 0; margin: 8px 0 0; list-style: none; }
  .annot li {
    font-size: 13px; line-height: 1.5;
    padding: 6px 0; border-bottom: 1px dotted #6b5e4555;
    display: grid; grid-template-columns: 14px 1fr; gap: 8px;
  }
  .annot li::before { content: "▸"; color: #2d6a4f; font-weight: 700; }
  .annot code {
    font-family: "Space Mono", monospace;
    font-size: 11.5px; background: #f0e9d9;
    padding: 1px 4px; color: #1a1008;
  }
</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="page2.jsx"></script>

<script type="text/babel">
const PALETTE = [
  { var: "--cat-eighth",     hex: "#2d6a4f", name: "EIGHTH",            note: "Forest green" },
  { var: "--cat-cart",       hex: "#9c2a2a", name: "1G CART",           note: "Oxblood" },
  { var: "--cat-edible",     hex: "#b8841c", name: "100MG EDIBLE",      note: "Mustard ochre" },
  { var: "--cat-resin",      hex: "#1f3a5f", name: "1G LIVE RESIN",     note: "Ink navy" },
  { var: "--cat-preroll",    hex: "#7a5a2e", name: "SINGLE PRE-ROLL",   note: "Tobacco brown" },
  { var: "--cat-infused",    hex: "#6b3a82", name: "INFUSED PRE-ROLL",  note: "Aged plum" },
  { var: "--cat-disposable", hex: "#3d6b78", name: "1G DISPOSABLE",     note: "Slate teal" },
];

function PaletteCard() {
  return (
    <div className="palette" data-screen-label="Palette · Proposal">
      <h3>The Lucky 7 Palette</h3>
      <div className="sub">Color proposal · Newspaper-native · No neon</div>
      <p>
        Seven colors that read as <em>ink-on-paper</em> rather than dashboard
        chrome. Each holds in chroma 0.06–0.12 and lightness 0.30–0.55, so they
        stay distinguishable both as bar fills and as 1.5px line strokes on{" "}
        <code style={{fontFamily:"'Space Mono',monospace",fontSize:11}}>#f4f0e4</code>.
        No two adjacent rows in the Lucky 7 list share a hue family.
      </p>
      <div className="swatches">
        {PALETTE.map(p => (
          <div key={p.var} className="swatch-row">
            <div className="swatch-chip" style={{ background: p.hex }} />
            <div>
              <div className="swatch-cat">{p.name}</div>
              <div className="swatch-var">{p.var}</div>
            </div>
            <div style={{fontFamily:"'Source Serif 4',serif", fontStyle:"italic", color:"#6b5e45", fontSize:13}}>
              {p.note}
            </div>
            <div className="swatch-hex">{p.hex.toUpperCase()}</div>
          </div>
        ))}
      </div>
      <div className="footnote">
        All seven were tested as 1px strokes against newsprint at small scale —
        the muted plum and slate teal are the closest pair; resolved by giving
        plum more red and teal more blue.
      </div>
    </div>
  );
}

function SectionNotes() {
  return (
    <div className="annot" data-screen-label="Layout Notes">
      <span className="kicker-tag">Editor’s notes · Pg. 2 spec</span>
      <h3>Three stacked sections, full-width, separated by double rules.</h3>
      <ul>
        <li><span><b>Lucky 7 averages</b> — proportional bars, max anchored to highest avg ($38.15, Live Resin). Track has a 25% column-rule grid so values are readable without per-bar gridlines.</span></li>
        <li><span><b>Big Mike’s Tea</b> — 3 columns desktop, 1 stacked column mobile. Source Serif 4, justified, dropcap on the first letter. <code>FILED · BEAT · SOURCES</code> meta in the head.</span></li>
        <li><span><b>Price History</b> — Day-1 empty state. One dot per category at today’s value, faint dotted ghost-trail back into history, dotted vertical TODAY guide, “⤳ LINES BUILD HERE” hint to the right.</span></li>
        <li><span>Mobile: bars wrap to a 2-row layout (name+price above, full-width bar below). Chart wraps in a horizontal-scroll container so values stay legible at 390px.</span></li>
        <li><span>No legend — colors are introduced in §1 and re-used in §3, just as the spec asked.</span></li>
      </ul>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas title="Daily Weed Newspaper · Page 2 — The Sheet" subtitle="High-fidelity layout · desktop + mobile · with palette proposal">
      <DCSection id="layouts" title="Layouts">
        <DCArtboard id="desktop" label="Desktop · 1180px column" width={1180} height={2200}>
          <PageTwo compact={false} />
        </DCArtboard>
        <DCArtboard id="mobile" label="Mobile · 390px" width={390} height={2080}>
          <PageTwo compact={true} />
        </DCArtboard>
      </DCSection>
      <DCSection id="system" title="Color & spec">
        <DCArtboard id="palette" label="Palette proposal" width={600} height={680}>
          <PaletteCard />
        </DCArtboard>
        <DCArtboard id="notes" label="Layout notes" width={480} height={520}>
          <SectionNotes />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<div id="root"></div>
</body>
</html>
